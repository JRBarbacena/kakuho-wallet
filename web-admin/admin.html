<!DOCTYPE html>
<html>
<head>
    <title>LTO Master Command Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h1 { color: #004085; border-bottom: 3px solid #004085; padding-bottom: 15px; margin-bottom: 30px; text-align: center; }
        .section { background: #f8f9fa; padding: 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #e9ecef; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        .btn-register { background-color: #0d6efd; }
        .btn-verify { background-color: #198754; width: 48%; }
        .btn-revoke { background-color: #dc3545; width: 48%; float: right; }
        #console { margin-top: 25px; padding: 20px; background: #212529; color: #20c997; font-family: monospace; border-radius: 8px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏛️ LTO Master Command Center</h1>
    <div class="section">
        <h2>1. Registration Desk (Issue New ID)</h2>
        <div class="form-group"><label>Citizen's Full Name</label><input type="text" id="regName"></div>
        <div class="form-group"><label>License Number</label><input type="text" id="regLicense"></div>
        <div class="form-group"><label>Secret PIN (4 Digits)</label><input type="password" id="regSecret"></div>
        <button class="btn-register" onclick="registerDriver()">🖨️ Generate Digital License</button>
    </div>
    <div class="section">
        <h2>2. Security Checkpoint</h2>
        <div class="form-group"><label>Target ZKP Hash</label><input type="text" id="targetHash"></div>
        <div class="form-group"><label>Admin Authorization Password</label><input type="password" id="adminPassword"></div>
        <div class="button-group">
            <button class="btn-verify" onclick="verifyHash()">✅ VERIFY ID</button>
            <button class="btn-revoke" onclick="revokeHash()">🚨 REVOKE ID</button>
        </div>
    </div>
    <div id="console"></div>
</div>
<script>
    async function registerDriver() {
        const name = document.getElementById('regName').value;
        const license = document.getElementById('regLicense').value;
        const secret = document.getElementById('regSecret').value;
        const consoleBox = document.getElementById('console');
        consoleBox.style.display = 'block';
        consoleBox.innerHTML = `Processing...`;
        try {
            const response = await fetch('http://localhost:3000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rawName: name, private_license_data: license, secret: secret })
            });
            const data = await response.json();
            consoleBox.innerHTML = response.ok ? `[SUCCESS] License Issued!\n${JSON.stringify(data, null, 2)}` : `[ERROR] ${data.message}`;
            if(response.ok) document.getElementById('targetHash').value = data.leafHash;
        } catch (e) { consoleBox.innerHTML = "CRITICAL ERROR: Cannot reach Backend."; }
    }
    async function verifyHash() { /* ... similar fetch logic ... */ }
    async function revokeHash() { /* ... similar fetch logic ... */ }
</script>
</body>
</html>
